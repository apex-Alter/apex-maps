<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地图导航</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #e0e0e0;
            --accent: #f15a24;
            --accent-glow: #ff7b4a;
            --card-bg: #141414;
            --border: #2a2a2a;
            --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -30%; left: -20%;
            width: 140%; height: 160%;
            background: radial-gradient(ellipse at center,
                rgba(241,90,36,0.04) 0%,
                rgba(241,90,36,0.01) 35%,
                transparent 70%);
            pointer-events: none; z-index: 0;
            animation: ambientPulse 8s ease-in-out infinite;
        }
        @keyframes ambientPulse {
            0%,100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        .container {
            position: relative; z-index: 1;
            text-align: center; padding: 2rem;
        }
        .divider-top {
            width: 60px; height: 3px;
            background: var(--accent);
            margin: 0 auto 2.5rem;
            border-radius: 2px; opacity: 0.7;
            animation: dividerGlow 3s ease-in-out infinite;
        }
        @keyframes dividerGlow {
            0%,100% { box-shadow: 0 0 8px rgba(241,90,36,0.3); }
            50% { box-shadow: 0 0 20px rgba(241,90,36,0.6); }
        }
        h1 {
            font-size: 1.1rem; font-weight: 400;
            letter-spacing: 0.35em; color: var(--muted);
            margin-bottom: 2.8rem; text-transform: uppercase;
            user-select: none;
        }
        .map-links {
            display: flex; flex-direction: column;
            gap: 0.6rem; align-items: center;
        }
        .map-link {
            display: inline-block; text-decoration: none;
            color: var(--text); font-size: 1.35rem;
            font-weight: 400; letter-spacing: 0.06em;
            padding: 0.55rem 1.8rem; border-radius: 6px;
            transition: all 0.35s cubic-bezier(0.25,0.8,0.25,1.2);
            position: relative; cursor: pointer;
            user-select: none; background: transparent;
            border: 1px solid transparent;
        }
        .map-link::after {
            content: ''; position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 1.5px;
            background: var(--accent);
            border-radius: 1px;
            transition: width 0.4s cubic-bezier(0.25,0.8,0.25,1);
        }
        .map-link:hover {
            color: #fff; background: var(--card-bg);
            border-color: var(--border);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .map-link:hover::after { width: 70%; }
        .map-link:active {
            transform: scale(0.96);
            transition: transform 0.15s ease;
        }
        .map-link .en-name {
            display: block; font-size: 0.7rem;
            letter-spacing: 0.08em; color: var(--muted);
            margin-top: 0.15rem; transition: color 0.35s;
        }
        .map-link:hover .en-name { color: var(--accent-glow); }
        .hint {
            margin-top: 3rem; font-size: 0.7rem;
            letter-spacing: 0.2em; color: var(--muted);
            opacity: 0.5; user-select: none;
        }
        @media (max-width: 600px) {
            .container { padding: 1.5rem 1rem; }
            .map-link { font-size: 1.15rem; padding: 0.5rem 1.2rem; letter-spacing: 0.04em; }
            .map-link .en-name { font-size: 0.65rem; }
            h1 { font-size: 0.9rem; letter-spacing: 0.25em; margin-bottom: 2rem; }
            .divider-top { margin-bottom: 1.8rem; }
            .hint { margin-top: 2rem; font-size: 0.65rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="divider-top"></div>
        <h1>Alter-bug-maps</h1>
        <nav class="map-links">
            <a href="map.html?map=kings-canyon" class="map-link">
                诸王峡谷<span class="en-name">King's Canyon</span>
            </a>
            <a href="map.html?map=olympus" class="map-link">
                奥林匹斯<span class="en-name">Olympus</span>
            </a>
            <a href="map.html?map=broken-moon" class="map-link">
                残月<span class="en-name">Broken Moon</span>
            </a>
            <a href="map.html?map=storm-point" class="map-link">
                风暴点<span class="en-name">Storm Point</span>
            </a>
            <a href="map.html?map=worlds-edge" class="map-link">
                世界尽头<span class="en-name">World's Edge</span>
            </a>
            <a href="map.html?map=power-plant" class="map-link">
                电力区域<span class="en-name">Power Plant</span>
            </a>
        </nav>
        <p class="hint">点击进入地图 · 滚轮缩放 · 拖拽平移</p>
    </div>
</body>
</html>
